name: Build Relay Desktop App

on:
  push:
    tags:
      - "relay-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install camera-relay dependencies
        run: cd camera-relay && npm install

      - name: Install relay-desktop dependencies
        run: cd relay-desktop && npm install

      - name: Copy ffmpeg binary into bin/
        run: |
          cd relay-desktop
          FFMPEG_BIN=$(node -e "process.stdout.write(require('ffmpeg-static'))")
          echo "ffmpeg-static path: $FFMPEG_BIN"
          mkdir -p bin
          cp "$FFMPEG_BIN" bin/ffmpeg.exe
          ls -la bin/

      - name: Build Windows installer
        run: cd relay-desktop && npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-windows
          path: relay-desktop/dist/*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: relay-desktop/dist/*.exe

  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install camera-relay dependencies
        run: cd camera-relay && npm install

      - name: Install relay-desktop dependencies
        run: cd relay-desktop && npm install

      - name: Copy ffmpeg binary into bin/
        run: |
          cd relay-desktop
          FFMPEG_BIN=$(node -e "process.stdout.write(require('ffmpeg-static'))")
          echo "ffmpeg-static path: $FFMPEG_BIN"
          mkdir -p bin
          cp "$FFMPEG_BIN" bin/ffmpeg
          chmod +x bin/ffmpeg
          ls -la bin/

      - name: Build macOS DMG
        run: cd relay-desktop && npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-mac
          path: relay-desktop/dist/*.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: relay-desktop/dist/*.dmg
