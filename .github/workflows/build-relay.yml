name: Build Relay Desktop App

on:
  push:
    tags:
      - "relay-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install camera-relay dependencies
        run: cd camera-relay && npm install

      - name: Install relay-desktop dependencies
        run: cd relay-desktop && npm install

      - name: Bundle portable Node.js for relay
        shell: bash
        run: |
          curl -fsSL https://nodejs.org/dist/v20.18.3/node-v20.18.3-win-x64.zip -o /tmp/node.zip
          unzip -j /tmp/node.zip "node-v20.18.3-win-x64/node.exe" -d relay-desktop/bin
          echo "Bundled node.exe: $(ls -lh relay-desktop/bin/node.exe)"

      - name: Build Windows installer
        run: cd relay-desktop && npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-windows
          path: relay-desktop/dist/*.exe

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "VP Chef Relay ${{ github.event.inputs.tag || github.ref_name }}"
          draft: false
          prerelease: false
          files: relay-desktop/dist/*.exe

  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install camera-relay dependencies
        run: cd camera-relay && npm install

      - name: Install relay-desktop dependencies
        run: cd relay-desktop && npm install

      - name: Build macOS DMG
        run: cd relay-desktop && npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-mac
          path: relay-desktop/dist/*.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "VP Chef Relay ${{ github.event.inputs.tag || github.ref_name }}"
          draft: false
          prerelease: false
          files: relay-desktop/dist/*.dmg
